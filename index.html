<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>금액 한글 변환기</title>
<style>
    /* 미니멀 업무용 스타일 */
    body { 
        font-family: 'Pretendard', 'Malgun Gothic', sans-serif; 
        background-color: #f1f3f5; 
        color: #212529; 
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .container { 
        background: #ffffff; 
        padding: 40px; 
        border-radius: 12px; 
        box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08); 
        width: 100%;
        max-width: 380px; 
        text-align: center;
    }
    h1 { 
        font-size: 22px; 
        margin-bottom: 8px;
        font-weight: 700;
    }
    p { 
        font-size: 14px; 
        color: #868e96; 
        margin-bottom: 24px; 
    }
    input { 
        width: 100%;
        padding: 14px; 
        font-size: 16px; 
        border: 1px solid #dee2e6; 
        border-radius: 6px; 
        outline: none; 
        box-sizing: border-box;
        transition: border-color 0.2s;
        margin-bottom: 12px;
    }
    input:focus { border-color: #228be6; }
    button { 
        width: 100%;
        background: #212529; 
        color: white; 
        border: none; 
        padding: 14px; 
        font-size: 16px; 
        border-radius: 6px; 
        cursor: pointer; 
        font-weight: 600;
    }
    button:hover { background: #000000; }
    .result-box { 
        margin-top: 24px; 
        padding: 18px; 
        background: #f8f9fa; 
        border: 1px solid #e9ecef;
        border-radius: 6px; 
        font-size: 19px; 
        font-weight: 700; 
        color: #1c7ed6; 
        min-height: 28px;
        word-break: break-all;
    }
    footer { 
        margin-top: 30px; 
        font-size: 11px; 
        color: #adb5bd; 
    }
</style>
</head>
<body>

<div class="container">
    <h1>금액 한글 변환</h1>
    <p>공문서용 금액 변환 도구</p>
    
    <input type="text" id="amountInput" placeholder="금액을 입력하세요 (예: 605000)" autocomplete="off">
    <button onclick="convert()">변환하기</button>
    
    <div class="result-box" id="resultOutput">-</div>
    
    <footer>Designed by artarimu</footer>
</div>

<script>
    function convert() {
        const raw = document.getElementById('amountInput').value;
        const numStr = raw.replace(/[^0-9]/g, '').replace(/^0+/, ''); 
        const resultEl = document.getElementById('resultOutput');

        if (!numStr && raw.replace(/[^0-9]/g, '') === '') {
            resultEl.style.color = "#fa5252";
            resultEl.innerText = "숫자를 입력해주세요.";
            return;
        }

        if (numStr.length > 16) {
            resultEl.style.color = "#fa5252";
            resultEl.innerText = "단위가 너무 큽니다.";
            return;
        }

        if (numStr === '' && raw.replace(/[^0-9]/g, '') !== '') {
            resultEl.style.color = "#495057";
            resultEl.innerText = "금영원";
            return;
        }

        resultEl.style.color = "#1c7ed6";
        const han = ['', '일', '이', '삼', '사', '오', '육', '칠', '팔', '구'];
        const units = ['', '십', '백', '천'];
        const bigUnits = ['', '만', '억', '조', '경'];

        let res = '';
        let len = numStr.length;

        for (let i = 0; i < len; i++) {
            let digit = parseInt(numStr[i], 10);
            let unitIndex = (len - i - 1) % 4;
            let bigUnitIndex = Math.floor((len - i - 1) / 4);
            if (digit !== 0) res += han[digit] + units[unitIndex];
            if (unitIndex === 0) {
                let chunk = numStr.slice(Math.max(0, i - 3), i + 1);
                if (parseInt(chunk, 10) !== 0) res += bigUnits[bigUnitIndex];
            }
        }
        resultEl.innerText = '금' + res + '원';
    }

    document.getElementById('amountInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') convert();
    });
</script>

</body>
</html>
